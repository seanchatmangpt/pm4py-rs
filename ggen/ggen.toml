# pm4py Bridge — ggen Code Generation Manifest
# Generates PyO3 bridge code from pm4py-api.ttl ontology.
#
# Run: cd pm4py-rust/ggen && ggen sync --from . --to ../src/python/generated
#
# Regenerate ontology first:
#   python3.11 scripts/generate_pm4py_ontology.py

[project]
name = "pm4py-bridge-generated"
version = "0.1.0"
description = "ggen-driven PyO3 bridge for pm4py 2.7.19.5 (257 functions)"

[ontology]
source = "ontology/pm4py-api.ttl"
base_iri = "https://chatmangpt.com/pm4py-api#"

[ontology.prefixes]
api  = "https://chatmangpt.com/pm4py-api#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd  = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "output"

# ─── helpers.rs — shared conversion utilities ─────────────────────────────────
# Emits: eventlog_to_pm4py, pm4py_petri_to_rust, rust_petri_to_pm4py (pub)
# Template is static code — SPARQL returns one dummy row as trigger.
[[generation.rules]]
name    = "bridge-helpers"
query   = { inline = """
PREFIX api: <https://chatmangpt.com/pm4py-api#>
SELECT ?marker
WHERE { BIND("helpers" AS ?marker) }
LIMIT 1
""" }
template    = { file = "templates/_helpers.rs.tera" }
output_file = "helpers.rs"
mode        = "Overwrite"
skip_empty  = false

# ─── discovery.rs — process model discovery ──────────────────────────────────
[[generation.rules]]
name  = "bridge-discovery"
query = { inline = """
PREFIX api: <https://chatmangpt.com/pm4py-api#>
SELECT ?functionName ?rustName ?callStyle ?convertResult ?paramCount
WHERE {
  ?fn a api:PythonFunction ;
      api:functionName ?functionName ;
      api:rustName     ?rustName ;
      api:inModule     api:module-discovery ;
      api:callStyle    ?callStyle ;
      api:convertResult ?convertResult ;
      api:paramCount   ?paramCount .
}
ORDER BY ?functionName
""" }
template    = { file = "templates/pm4py_module.rs.tera" }
output_file = "discovery.rs"
mode        = "Overwrite"
skip_empty  = false

