# ─── tests.rs — official pm4py API tests (one per function) ─────────────────
# Covers: discovery, conformance, statistics, io, convert
#   × log_only, log_and_net, log_and_model, io_read, io_write
#
# Permanently excluded (need special fixtures or extra required args):
#   - check_is_fitting (takes Trace not EventLog; deprecated)
#   - replay_prefix_tbr (takes string prefix not EventLog)
#   - get_activity_position_summary, get_event_attribute_values,
#     get_trace_attribute_values, get_frequent_trace_segments,
#     get_case_duration, get_process_cube (need attribute/case/column args)
#   - get_variants_paths_duration, correlation_miner, discover_batches
#     (require DataFrame with specific columns)
#   - convert_log_to_networkx, convert_log_to_ocel, convert_log_to_time_intervals,
#     convert_petri_net_to_networkx, convert_petri_net_type,
#     convert_to_dataframe, convert_to_event_log, convert_to_event_stream
#     (need network/petri_net object or return incompatible types)
[[generation.rules]]
name  = "bridge-tests"
query = { inline = """
PREFIX api:  <https://chatmangpt.com/pm4py-api#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?rustName ?pyName ?callStyle ?convertResult ?module
WHERE {
  ?fn a api:PythonFunction ;
      api:rustName     ?rustName ;
      api:functionName ?pyName ;
      api:callStyle    ?callStyle ;
      api:convertResult ?convertResult ;
      api:inModule ?mod .
  ?mod rdfs:label ?module .
  FILTER(?callStyle IN ("log_only", "log_and_net", "log_and_model", "io_read", "io_write"))
  FILTER(?module IN ("discovery", "conformance", "statistics", "io", "convert"))
  FILTER(?pyName NOT IN (
    "check_is_fitting",
    "replay_prefix_tbr",
    "get_activity_position_summary", "get_event_attribute_values",
    "get_trace_attribute_values", "get_frequent_trace_segments",
    "get_case_duration", "get_process_cube",
    "get_variants_paths_duration", "correlation_miner", "discover_batches",
    "convert_log_to_networkx", "convert_log_to_ocel", "convert_log_to_time_intervals",
    "convert_petri_net_to_networkx", "convert_petri_net_type",
    "convert_to_dataframe", "convert_to_event_log", "convert_to_event_stream",
    "convert_to_bpmn", "convert_to_petri_net", "convert_to_powl",
    "convert_to_process_tree", "convert_to_reachability_graph",
    "read_bpmn", "read_dfg", "read_pnml", "read_ptml",
    "write_bpmn", "write_dfg", "write_pnml", "write_ptml",
    "fitness_footprints"
  ))
}
ORDER BY ?module ?pyName
""" }
template    = { file = "templates/pm4py_tests.rs.tera" }
output_file = "tests.rs"
mode        = "Overwrite"
skip_empty  = false

# ─── ocel_tests.rs — OCEL function tests (synthetic OCEL fixture) ────────────
[[generation.rules]]
name  = "bridge-tests-ocel"
query = { inline = """
PREFIX api:  <https://chatmangpt.com/pm4py-api#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?rustName ?pyName ?callStyle ?convertResult ?module
WHERE {
  ?fn a api:PythonFunction ;
      api:rustName     ?rustName ;
      api:functionName ?pyName ;
      api:callStyle    ?callStyle ;
      api:convertResult ?convertResult ;
      api:inModule ?mod .
  ?mod rdfs:label ?module .
  FILTER(?callStyle = "ocel_only")
  FILTER(?module = "ocpm")
  FILTER(?pyName NOT IN (
    "ocel_sort_by_additional_column",
    "sample_ocel_objects",
    "cluster_equivalent_ocel",
    "ocel_flattening"
  ))
}
ORDER BY ?pyName
""" }
template    = { file = "templates/pm4py_ocel_tests.rs.tera" }
output_file = "ocel_tests.rs"
mode        = "Overwrite"
skip_empty  = false

# ─── mod.rs — re-export all submodules ───────────────────────────────────────
[[generation.rules]]
name  = "bridge-mod"
query = { inline = """
PREFIX api:  <https://chatmangpt.com/pm4py-api#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT DISTINCT ?moduleName
WHERE {
  ?mod a api:Module ;
       rdfs:label ?moduleName .
  FILTER(?moduleName IN ("discovery", "conformance", "statistics", "io", "ocpm",
                         "filtering", "utils", "analysis", "convert"))
}
ORDER BY ?moduleName
""" }
template    = { file = "templates/mod.rs.tera" }
output_file = "mod.rs"
mode        = "Overwrite"
skip_empty  = false
