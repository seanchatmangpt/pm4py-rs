apiVersion: v1
kind: ConfigMap
metadata:
  name: pm4py-retention-policy
  namespace: pm4py-prod
  labels:
    app: pm4py-api
  annotations:
    description: "Log retention and backup configuration"
data:
  retention-days: "30"
  backup-frequency: "daily"
  backup-time: "02:00"
  compression: "gzip"
  max-archive-size: "1Gi"

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pm4py-logs-pv
  labels:
    app: pm4py-api
    type: logs
  annotations:
    description: "PersistentVolume for pm4py event logs"
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: pm4py-logs-sc

  # NFS backend (change to appropriate storage type)
  nfs:
    server: nfs-server.example.com
    path: /exports/pm4py-logs

  # Alternative: local storage
  # hostPath:
  #   path: /mnt/pm4py-logs
  #   type: DirectoryOrCreate

  # Alternative: AWS EBS
  # awsElasticBlockStore:
  #   volumeID: vol-12345678
  #   fsType: ext4

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: pm4py-logs-sc
  labels:
    app: pm4py-api
  annotations:
    description: "StorageClass for pm4py logs with retention policies"
provisioner: kubernetes.io/nfs
allowVolumeExpansion: true
parameters:
  fstype: nfs4
  nfsVersion: "4.1"
volumeBindingMode: Immediate
reclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pm4py-logs-pvc
  namespace: pm4py-prod
  labels:
    app: pm4py-api
    type: logs
  annotations:
    description: "PersistentVolumeClaim for pm4py event logs storage"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: pm4py-logs-sc
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pm4py-backups-pv
  labels:
    app: pm4py-api
    type: backups
  annotations:
    description: "PersistentVolume for pm4py log backups"
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: pm4py-backups-sc

  nfs:
    server: backup-nfs-server.example.com
    path: /exports/pm4py-backups

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: pm4py-backups-sc
  labels:
    app: pm4py-api
  annotations:
    description: "StorageClass for pm4py backup storage"
provisioner: kubernetes.io/nfs
allowVolumeExpansion: true
reclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pm4py-backups-pvc
  namespace: pm4py-prod
  labels:
    app: pm4py-api
    type: backups
  annotations:
    description: "PersistentVolumeClaim for pm4py backup storage"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: pm4py-backups-sc
  resources:
    requests:
      storage: 100Gi

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pm4py-backup-job
  namespace: pm4py-prod
  labels:
    app: pm4py-api
  annotations:
    description: "Automated backup job for pm4py logs"
spec:
  schedule: "0 2 * * *"  # 2:00 AM daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300

  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: pm4py-api
            job: backup
        spec:
          serviceAccountName: pm4py-api
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001

          containers:
            - name: backup
              image: busybox:1.35
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DATE=$(date +%Y-%m-%d)
                  BACKUP_FILE="/backup/pm4py-logs-${BACKUP_DATE}.tar.gz"

                  echo "Starting backup: ${BACKUP_FILE}"
                  tar -czf "${BACKUP_FILE}" -C /data . || echo "Warning: backup partial"

                  # Retention: keep last 30 days
                  find /backup -name "pm4py-logs-*.tar.gz" -mtime +30 -delete

                  echo "Backup completed successfully"
                  ls -lh /backup/

              volumeMounts:
                - name: logs-volume
                  mountPath: /data
                  readOnly: true
                - name: backup-volume
                  mountPath: /backup

              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"

          volumes:
            - name: logs-volume
              persistentVolumeClaim:
                claimName: pm4py-logs-pvc
            - name: backup-volume
              persistentVolumeClaim:
                claimName: pm4py-backups-pvc

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pm4py-archive-job
  namespace: pm4py-prod
  labels:
    app: pm4py-api
  annotations:
    description: "Archive and compress old logs"
spec:
  schedule: "0 3 * * 0"  # 3:00 AM every Sunday
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2

  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: pm4py-api
            job: archive
        spec:
          serviceAccountName: pm4py-api
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001

          containers:
            - name: archive
              image: busybox:1.35
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "Archiving logs older than 7 days"
                  find /data -type f -mtime +7 -exec gzip {} \; 2>/dev/null || true

                  echo "Archive job completed"

              volumeMounts:
                - name: logs-volume
                  mountPath: /data

              resources:
                requests:
                  cpu: "50m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"

          volumes:
            - name: logs-volume
              persistentVolumeClaim:
                claimName: pm4py-logs-pvc
